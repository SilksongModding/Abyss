name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Smoke-test Rust availability
        run: |
          rustc --version
          cargo --version
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-
      - name: Run clippy via Makefile
        run: make clippy
      - name: Run tests via Makefile
        run: make test

      - name: Build release via Makefile
        run: make release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: abyss-release
          path: target/release/abyss

  matrix-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Smoke-test Rust availability (non-Windows)
        if: runner.os != 'Windows'
        run: |
          rustc --version
          cargo --version
      - name: Set up Rust (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "CARGO_HOME=$HOME/.cargo" >> $GITHUB_ENV
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Smoke-test Rust availability (Windows)
        if: runner.os == 'Windows'
        run: |
          rustc --version
          cargo --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Build release via Makefile
        run: make release

      - name: Upload release artifact (per-OS)
        uses: actions/upload-artifact@v4
        with:
          name: abyss-release-${{ matrix.os }}
          path: |
            ${{ runner.os == 'Windows' && 'target\\release\\abyss.exe' || 'target/release/abyss' }}
